<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>Cornerstone — Route Dispatcher</title>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js'
    import { getFirestore, collection, doc, setDoc, onSnapshot,
             query, where, Timestamp, getDocs }
      from 'https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js'

    // ── Firebase ──────────────────────────────────────────────────────────────
    const app = initializeApp({
      apiKey:'AIzaSyDSIcTiBswVGF2oCSzUocAPEN3qi_muYls',
      authDomain:'serviroute-3ec0d.firebaseapp.com',
      projectId:'serviroute-3ec0d',
      storageBucket:'serviroute-3ec0d.firebasestorage.app',
      messagingSenderId:'203389465925',
      appId:'1:203389465925:web:31658625175d7a5ac53a2c',
    })
    const db = getFirestore(app)

    // ── Static data ───────────────────────────────────────────────────────────
    const DEPOT = { name:'Cornerstone Office/Yard', lat:28.0500, lng:-82.2000, address:'Cornerstone LLC, Tampa, FL' }

    const CREW = [
      { pin:'1001', name:'Neri',   lm:'LM1', color:'#16a34a', text:'#fff' },
      { pin:'1002', name:'Mateos', lm:'LM2', color:'#2563eb', text:'#fff' },
      { pin:'1003', name:'Erick',  lm:'LM3', color:'#d97706', text:'#fff' },
      { pin:'1004', name:'Luis',   lm:'LM4', color:'#7c3aed', text:'#fff' },
      { pin:'1005', name:'Mario',  lm:'LM5', color:'#db2877', text:'#fff' },
    ]

    const PROPERTIES = {
      'Sienna Cove':       { lat:28.2106, lng:-82.3370 },
      'Wilder Meadow':     { lat:28.0167, lng:-82.1142 },
      'Woodlake Preserve': { lat:28.2189, lng:-82.4595 },
      'Bridge Haven':      { lat:28.2400, lng:-82.3500 },
      'Altera':            { lat:28.0167, lng:-82.1142 },
      'Walden Pond':       { lat:28.0167, lng:-82.1142 },
      'Walden Woods':      { lat:28.0167, lng:-82.1142 },
      'Willow Walk':       { lat:27.5210, lng:-82.5740 },
      'Golden Meadow':     { lat:27.5800, lng:-82.4250 },
      'Cheyenne Preserve': { lat:27.8950, lng:-82.4150 },
      'Cedar Mills':       { lat:27.8364, lng:-82.3265 },
      'Birchwood':         { lat:28.2189, lng:-82.4595 },
      'Trotters Crossing': { lat:28.2336, lng:-82.1812 },
      'Belmont Glen':      { lat:27.7200, lng:-82.4356 },
      'Victory Landing':   { lat:27.8550, lng:-82.3700 },
      'Spring Rose':       { lat:27.8364, lng:-82.3265 },
      'Boyette':           { lat:28.2400, lng:-82.3500 },
      'Bell Lake':         { lat:28.2189, lng:-82.4595 },
      'Camden Woods':      { lat:28.2400, lng:-82.3500 },
      'Office / Yard':     { lat:28.0500, lng:-82.2000 },
    }

    const SCHEDULE = {
      Monday:    { Neri:'Sienna Cove', Mateos:'Woodlake Preserve', Erick:'Willow Walk', Luis:'Birchwood', Mario:'Walden Woods' },
      Tuesday:   { Neri:'Sienna Cove', Mateos:'Bridge Haven', Erick:'Willow Walk / Golden Meadow', Luis:'Trotters Crossing', Mario:'Spring Rose' },
      Wednesday: { Neri:'Sienna Cove', Mateos:'Bridge Haven', Erick:'Cheyenne Preserve', Luis:'Belmont Glen', Mario:'Boyette / Bell Lake' },
      Thursday:  { Neri:'Wilder Meadow', Mateos:'Altera / Walden Pond', Erick:'Cedar Mills', Luis:'Victory Landing / Altera', Mario:'Camden Woods' },
    }

    // ── State ─────────────────────────────────────────────────────────────────
    let map = null
    let gmReady = false
    let selectedDate = new Date().toISOString().slice(0,10)
    let routes = {}        // pin → { crewPin, crewName, date, stops[] }
    let liveShifts = []
    let markers = []       // all map markers
    let routeLines = []    // polylines
    let dirRenderers = []  // DirectionsRenderers
    let activeTab = 'routes'  // 'routes' | 'crew'
    let pendingRouteQueue = [] // queue route draws until GM ready
    let unsubDispatch = null

    function dayName(dateStr) {
      return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][
        new Date(dateStr+'T12:00:00').getDay()]
    }
    function todayStr() { return new Date().toISOString().slice(0,10) }
    function parseStops(raw) { return (raw||'').split('/').map(s=>s.trim()).filter(Boolean) }
    function dist(a,b) {
      // haversine km
      const R=6371, dLat=(b.lat-a.lat)*Math.PI/180, dLng=(b.lng-a.lng)*Math.PI/180
      const x=Math.sin(dLat/2)**2+Math.cos(a.lat*Math.PI/180)*Math.cos(b.lat*Math.PI/180)*Math.sin(dLng/2)**2
      return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x))
    }

    // ── Sort stops by nearest-neighbor from depot ─────────────────────────────
    function optimizeRoute(stops) {
      const coords = stops.map(s => PROPERTIES[s] || DEPOT)
      let remaining = stops.map((s,i)=>i), result = [], current = DEPOT
      while (remaining.length) {
        let best = -1, bestDist = Infinity
        for (const i of remaining) {
          const d = dist(current, coords[i])
          if (d < bestDist) { bestDist = d; best = i }
        }
        result.push(stops[best])
        current = coords[best]
        remaining = remaining.filter(i=>i!==best)
      }
      return result
    }

    // ── Google Maps loader ────────────────────────────────────────────────────
    window.initGMap = function() {
      gmReady = true
      const mapEl = document.getElementById('dispatch-map')
      map = new google.maps.Map(mapEl, {
        center:{lat:28.05,lng:-82.35}, zoom:10,
        mapTypeId:'roadmap',
        disableDefaultUI:false,
        zoomControl:true,
        streetViewControl:false,
        mapTypeControl:true,
        fullscreenControl:true,
      })
      // Drop depot marker
      new google.maps.Marker({
        position:DEPOT,
        map,
        title:'Depot — '+DEPOT.name,
        icon:{ path:google.maps.SymbolPath.CIRCLE, scale:14,
               fillColor:'#0d1f3a', fillOpacity:1, strokeColor:'#fff', strokeWeight:3 },
        label:{ text:'D', color:'#fff', fontWeight:'bold', fontSize:'11px' },
        zIndex:999,
      })
      // Draw any pending routes
      pendingRouteQueue.forEach(fn=>fn())
      pendingRouteQueue=[]
    }

    function loadGM() {
      if (window.google?.maps) { window.initGMap(); return }
      const s = document.createElement('script')
      s.src = 'https://maps.googleapis.com/maps/api/js?key=AIzaSyAfrZbRXLbrQGNHrjobcamxKuXBUm94nR8&callback=initGMap&libraries=directions,geometry'
      s.async = true; s.defer = true
      document.head.appendChild(s)
    }

    // ── Map drawing ───────────────────────────────────────────────────────────
    function clearMapOverlays() {
      markers.forEach(m=>m.setMap(null));       markers=[]
      routeLines.forEach(l=>l.setMap(null));    routeLines=[]
      dirRenderers.forEach(r=>r.setMap(null));  dirRenderers=[]
    }

    function drawAllRoutes() {
      if (!gmReady) { pendingRouteQueue.push(drawAllRoutes); return }
      clearMapOverlays()

      const bounds = new google.maps.LatLngBounds()
      bounds.extend(DEPOT)

      CREW.forEach(crew => {
        const route = routes[crew.pin]
        if (!route || !route.stops.length) return
        const stops = route.stops

        // Place numbered property markers
        stops.forEach((stop, idx) => {
          const coord = PROPERTIES[stop]
          if (!coord) return
          bounds.extend(coord)
          const m = new google.maps.Marker({
            position: coord, map,
            title: `${crew.name} — Stop ${idx+1}: ${stop}`,
            icon:{
              path: google.maps.SymbolPath.CIRCLE,
              scale: 13,
              fillColor: crew.color,
              fillOpacity: 0.95,
              strokeColor: '#fff',
              strokeWeight: 2,
            },
            label:{
              text: String(idx+1),
              color: crew.text,
              fontSize:'10px', fontWeight:'bold'
            },
            zIndex: 50,
          })
          const iw = new google.maps.InfoWindow({
            content:`<div style="font:600 13px sans-serif;padding:2px">
              <span style="color:${crew.color}">■</span>
              ${crew.name} · Stop ${idx+1}<br>
              <b>${stop}</b>
            </div>`
          })
          m.addListener('click', ()=>{ iw.open(map,m) })
          markers.push(m)
        })

        // Draw route line: Depot → stops[0] → stops[1] … → last stop
        // Use DirectionsService for real road routing
        const waypoints = stops.slice(0,-1).map(s => ({
          location: PROPERTIES[s] || DEPOT,
          stopover: true,
        }))
        const finalStop = PROPERTIES[stops[stops.length-1]] || DEPOT

        const dr = new google.maps.DirectionsRenderer({
          map,
          suppressMarkers: true,
          preserveViewport: true,
          polylineOptions:{
            strokeColor: crew.color,
            strokeOpacity: 0.7,
            strokeWeight: 4,
          }
        })
        dirRenderers.push(dr)

        const svc = new google.maps.DirectionsService()
        svc.route({
          origin: DEPOT,
          destination: finalStop,
          waypoints: waypoints,
          optimizeWaypoints: false,
          travelMode: google.maps.TravelMode.DRIVING,
        }, (result, status) => {
          if (status === 'OK') {
            dr.setDirections(result)
            // Update ETA in UI
            const legs = result.routes[0].legs
            const totalDist = legs.reduce((sum,l)=>sum+(l.distance?.value||0),0)
            const totalDur  = legs.reduce((sum,l)=>sum+(l.duration?.value||0),0)
            const distKm = (totalDist/1000).toFixed(1)
            const durMin = Math.round(totalDur/60)
            const eta = document.getElementById(`eta-${crew.pin}`)
            if (eta) eta.textContent = `${distKm} km · ${durMin} min driving`
          }
        })
      })

      // Fit map to all routes
      if (!bounds.isEmpty()) map.fitBounds(bounds, {top:60,right:40,bottom:40,left:40})
    }

    // ── Firestore ─────────────────────────────────────────────────────────────
    function subscribeDate(date) {
      if (unsubDispatch) unsubDispatch()
      const q = query(collection(db,'dispatchRoutes'), where('date','==',date))
      unsubDispatch = onSnapshot(q, snap => {
        snap.docs.forEach(d => {
          const data = d.data()
          if (!routes[data.crewPin] || routes[data.crewPin]._fromServer) {
            routes[data.crewPin] = { ...data, _fromServer:true }
          }
        })
        renderSidebar()
        drawAllRoutes()
        updatePlanSummary()
      })

      // Live shift status
      const sq = query(collection(db,'timeclock_shifts'), where('date','==',date))
      getDocs(sq).then(snap => {
        liveShifts = snap.docs.map(d=>d.data())
        renderCrewPanel()
      })
    }

    async function saveRoute(pin) {
      const route = routes[pin]
      if (!route) return
      const ref = doc(db,'dispatchRoutes',`${pin}_${route.date}`)
      await setDoc(ref, {
        crewPin:route.crewPin, crewName:route.crewName,
        date:route.date, stops:route.stops, savedAt:Timestamp.now()
      })
      routes[pin]._fromServer = true
      showToast(`${route.crewName}'s route saved & dispatched ✓`)
      renderSidebar()
    }

    async function saveAll() {
      for (const c of CREW) { if (routes[c.pin]?.stops?.length) await saveRoute(c.pin) }
      showToast('All routes saved & dispatched ✓','green')
    }

    // ── Route operations ──────────────────────────────────────────────────────
    function ensureRoute(pin) {
      const c = CREW.find(x=>x.pin===pin)
      if (!routes[pin]) routes[pin] = { crewPin:pin, crewName:c.name, date:selectedDate, stops:[], _fromServer:false }
      return routes[pin]
    }
    function addStop(pin, stop) {
      if (!stop) return
      const r = ensureRoute(pin)
      if (!r.stops.includes(stop)) { r.stops.push(stop); r._fromServer=false }
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
    }
    function removeStop(pin, idx) {
      ensureRoute(pin).stops.splice(idx,1)
      routes[pin]._fromServer=false
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
    }
    function moveStop(pin,idx,dir) {
      const stops=ensureRoute(pin).stops
      const swap=idx+dir
      if(swap<0||swap>=stops.length) return
      ;[stops[idx],stops[swap]]=[stops[swap],stops[idx]]
      routes[pin]._fromServer=false
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
    }
    function optimizeRouteForCrew(pin) {
      const r = ensureRoute(pin)
      r.stops = optimizeRoute(r.stops)
      r._fromServer=false
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
      showToast(`${r.crewName}'s route optimized from depot`)
    }
    function optimizeAll() {
      CREW.forEach(c=>{ if(routes[c.pin]?.stops?.length) optimizeRouteForCrew(c.pin) })
    }
    function loadTemplate(date) {
      const day = dayName(date)
      const tpl = SCHEDULE[day]
      if (!tpl) { showToast('No template for '+day,'amber'); return }
      CREW.forEach(c=>{
        const raw = tpl[c.name]||''
        routes[c.pin] = { crewPin:c.pin, crewName:c.name, date, stops:parseStops(raw), _fromServer:false }
      })
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
      showToast('Template loaded — '+day)
    }
    function clearAll() {
      CREW.forEach(c=>{ if(routes[c.pin]) { routes[c.pin].stops=[]; routes[c.pin]._fromServer=false } })
      renderSidebar(); drawAllRoutes(); updatePlanSummary()
    }

    // ── Plan Summary ──────────────────────────────────────────────────────────
    function updatePlanSummary() {
      const totalStops = CREW.reduce((sum,c)=>sum+(routes[c.pin]?.stops?.length||0),0)
      const crewsActive = CREW.filter(c=>routes[c.pin]?.stops?.length>0).length
      document.getElementById('summary-stops').textContent   = totalStops
      document.getElementById('summary-crews').textContent   = crewsActive+'/5'
      document.getElementById('summary-date').textContent    = selectedDate
      document.getElementById('summary-day').textContent     = dayName(selectedDate)||'—'
      document.getElementById('summary-depot').textContent   = DEPOT.name
    }

    // ── Render sidebar route list ─────────────────────────────────────────────
    function renderSidebar() {
      const container = document.getElementById('route-list')
      if (!container) return
      container.innerHTML = CREW.map(crew => {
        const route = routes[crew.pin] || { stops:[] }
        const stops = route.stops
        const status = crewStatus(crew.name)
        const unsaved = !route._fromServer

        return `
        <div class="crew-block border border-gray-100 rounded-xl overflow-hidden mb-3">
          <!-- Crew header -->
          <div class="flex items-center gap-2 px-3 py-2.5 bg-white border-b border-gray-50">
            <div class="w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm shrink-0"
              style="background:${crew.color};color:${crew.text}">${crew.name[0]}</div>
            <div class="flex-1 min-w-0">
              <div class="font-bold text-gray-800 text-sm leading-tight">${crew.name}
                <span class="text-gray-400 font-normal text-xs ml-1">${crew.lm}</span>
              </div>
              <div class="text-xs" style="color:${status.color}">${status.label}</div>
            </div>
            <div class="flex gap-1 shrink-0">
              <button onclick="optimizeRouteForCrew('${crew.pin}')"
                title="Optimize from depot"
                class="h-7 px-2 rounded bg-blue-50 text-blue-600 text-xs font-semibold hover:bg-blue-100">⚡</button>
              <button onclick="saveRoute('${crew.pin}')"
                class="h-7 px-2 rounded text-xs font-bold text-white hover:opacity-90"
                style="background:${unsaved?crew.color:'#6b7280'}">${unsaved?'Save':'✓'}</button>
            </div>
          </div>

          <!-- ETA row -->
          <div id="eta-${crew.pin}" class="px-3 py-1 text-xs text-gray-400 bg-gray-50 border-b border-gray-100">
            ${stops.length?'Calculating route…':'No stops assigned'}
          </div>

          <!-- Stop list -->
          ${stops.length ? `
          <div class="divide-y divide-gray-50">
            ${stops.map((stop,i)=>`
            <div class="flex items-center gap-2 px-3 py-2 bg-white group hover:bg-gray-50">
              <div class="w-5 h-5 rounded-full flex items-center justify-center text-xs font-bold text-white shrink-0"
                style="background:${crew.color}">${i+1}</div>
              <div class="flex-1 text-xs text-gray-700 truncate font-medium">${stop}</div>
              <div class="flex gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
                <button onclick="moveStop('${crew.pin}',${i},-1)" ${i===0?'disabled':''} class="h-6 w-6 flex items-center justify-center rounded text-gray-400 hover:bg-gray-200 disabled:opacity-20">↑</button>
                <button onclick="moveStop('${crew.pin}',${i},1)" ${i===stops.length-1?'disabled':''} class="h-6 w-6 flex items-center justify-center rounded text-gray-400 hover:bg-gray-200 disabled:opacity-20">↓</button>
                <button onclick="removeStop('${crew.pin}',${i})" class="h-6 w-6 flex items-center justify-center rounded text-red-400 hover:bg-red-50">✕</button>
              </div>
            </div>`).join('')}
          </div>` : `
          <div class="px-3 py-3 text-xs text-gray-400 italic text-center bg-white">No stops — add below</div>`}

          <!-- Add stop -->
          <div class="flex gap-1.5 px-3 py-2 bg-gray-50 border-t border-gray-100">
            <select id="sel-${crew.pin}" onchange=""
              class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white focus:outline-none focus:ring-1"
              style="--tw-ring-color:${crew.color}">
              <option value="">＋ Add property…</option>
              ${Object.keys(PROPERTIES).map(p=>`<option value="${p}">${p}</option>`).join('')}
            </select>
            <button onclick="addFromSelect('${crew.pin}')"
              class="h-7 px-2.5 rounded-lg text-white text-xs font-bold hover:opacity-90 shrink-0"
              style="background:${crew.color}">Add</button>
          </div>
          <!-- Custom property -->
          <div class="flex gap-1.5 px-3 pb-2 bg-gray-50">
            <input id="custom-${crew.pin}" type="text" placeholder="Custom address or property…"
              class="flex-1 text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white focus:outline-none"
              onkeydown="if(event.key==='Enter') addCustom('${crew.pin}')"/>
            <button onclick="addCustom('${crew.pin}')"
              class="h-7 px-2 rounded-lg border border-gray-200 text-gray-500 text-xs hover:bg-gray-100 shrink-0">+</button>
          </div>
        </div>`
      }).join('')
    }

    function renderCrewPanel() {
      const container = document.getElementById('crew-panel')
      if (!container) return
      container.innerHTML = `
        <div class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-3">Crew Status — ${selectedDate}</div>
        ${CREW.map(c=>{
          const s = crewStatus(c.name)
          const shift = liveShifts.find(x=>x.crewName===c.name&&!x.clockOut)
          const hours = liveShifts.filter(x=>x.crewName===c.name&&x.durationMinutes)
                          .reduce((sum,x)=>sum+(x.durationMinutes||0),0)
          return `
          <div class="flex items-center gap-3 py-2.5 border-b border-gray-100 last:border-0">
            <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold shrink-0"
              style="background:${c.color};color:${c.text}">${c.name[0]}</div>
            <div class="flex-1 min-w-0">
              <div class="font-semibold text-gray-800 text-sm">${c.name} <span class="text-gray-400 text-xs font-normal">${c.lm}</span></div>
              <div class="text-xs" style="color:${s.color}">${s.label}${shift?' · '+shift.property:''}</div>
              ${hours>0?`<div class="text-xs text-gray-400">${Math.floor(hours/60)}h ${hours%60}m logged</div>`:''}
            </div>
            <div class="text-xs font-semibold px-2 py-1 rounded-full shrink-0"
              style="background:${s.color}20;color:${s.color}">${s.label}</div>
          </div>`
        }).join('')}`
    }

    function crewStatus(name) {
      const shift = liveShifts.find(s=>s.crewName===name&&!s.clockOut)
      if (shift) return { label:'On Clock', color:'#16a34a' }
      if (liveShifts.some(s=>s.crewName===name)) return { label:'Done', color:'#6b7280' }
      return { label:'Not In', color:'#dc2626' }
    }

    // ── Expose to HTML ────────────────────────────────────────────────────────
    window.addFromSelect = pin => {
      const sel = document.getElementById(`sel-${pin}`)
      if (sel?.value) { addStop(pin, sel.value); sel.value='' }
    }
    window.addCustom = pin => {
      const inp = document.getElementById(`custom-${pin}`)
      if (inp?.value.trim()) { addStop(pin, inp.value.trim()); inp.value='' }
    }
    window.moveStop   = moveStop
    window.removeStop = removeStop
    window.saveRoute  = saveRoute
    window.saveAll    = saveAll
    window.optimizeRouteForCrew = optimizeRouteForCrew

    window.handleDateChange = val => {
      selectedDate = val
      routes = {}
      document.getElementById('day-badge').textContent = dayName(val)||'—'
      subscribeDate(val)
      updatePlanSummary()
    }
    window.loadTemplate = () => loadTemplate(selectedDate)
    window.optimizeAll  = optimizeAll
    window.clearAll     = clearAll
    window.switchTab    = tab => {
      activeTab = tab
      document.getElementById('tab-routes').className = tab==='routes' ? TAB_ACTIVE : TAB_IDLE
      document.getElementById('tab-crew').className   = tab==='crew'   ? TAB_ACTIVE : TAB_IDLE
      document.getElementById('pane-routes').style.display = tab==='routes' ? '' : 'none'
      document.getElementById('pane-crew').style.display   = tab==='crew'   ? '' : 'none'
    }
    window.loadDay = day => {
      const target = {Monday:1,Tuesday:2,Wednesday:3,Thursday:4}[day]
      const now = new Date(), curr = now.getDay()
      let diff = target-curr; if(diff<=0) diff+=7
      const d=new Date(now); d.setDate(d.getDate()+diff)
      const ds=d.toISOString().slice(0,10)
      document.getElementById('date-input').value=ds
      selectedDate=ds
      routes={}
      document.getElementById('day-badge').textContent=day
      subscribeDate(ds)
      loadTemplate(ds)
      updatePlanSummary()
    }

    const TAB_ACTIVE = 'flex-1 py-2 text-xs font-bold border-b-2 border-blue-600 text-blue-600 bg-white'
    const TAB_IDLE   = 'flex-1 py-2 text-xs font-semibold text-gray-400 hover:text-gray-600 bg-white'

    function showToast(msg, color='green') {
      const t=document.getElementById('toast')
      t.textContent=msg
      t.style.background = color==='amber'?'#d97706':color==='red'?'#dc2626':'#16a34a'
      t.style.opacity='1'
      clearTimeout(t._tid)
      t._tid=setTimeout(()=>{t.style.opacity='0'},3000)
    }

    // ── Init ──────────────────────────────────────────────────────────────────
    document.addEventListener('DOMContentLoaded', ()=>{
      const today=todayStr()
      selectedDate=today
      document.getElementById('date-input').value=today
      document.getElementById('day-badge').textContent=dayName(today)||'—'

      // Init empty route slots
      CREW.forEach(c=>{ routes[c.pin]={ crewPin:c.pin, crewName:c.name, date:today, stops:[], _fromServer:false } })
      renderSidebar()
      renderCrewPanel()
      updatePlanSummary()
      subscribeDate(today)
      loadGM()
    })
  </script>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
    #dispatch-map{width:100%;height:100%}
    .crew-block{transition:box-shadow .15s}
    .crew-block:hover{box-shadow:0 2px 12px rgba(0,0,0,.07)}
    #toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
           padding:10px 20px;border-radius:10px;color:#fff;font-size:13px;
           font-weight:600;transition:opacity .3s;opacity:0;z-index:9999;pointer-events:none}
    ::-webkit-scrollbar{width:5px}
    ::-webkit-scrollbar-track{background:#f1f1f1}
    ::-webkit-scrollbar-thumb{background:#d1d5db;border-radius:3px}
    select,input{font:inherit}
    button{cursor:pointer}
    .tab-bar{display:flex;border-bottom:1px solid #e5e7eb}
  </style>
</head>

<body class="bg-gray-100">

<!-- Toast -->
<div id="toast"></div>

<!-- ── TOP NAV ─────────────────────────────────────────────────────────── -->
<header style="background:#0d1f3a;padding:0 20px;height:52px;display:flex;align-items:center;gap:16px;flex-shrink:0;z-index:10">
  <div style="color:#fff;font-weight:800;font-size:17px;letter-spacing:-.3px">🗺 Cornerstone Dispatch</div>
  <div style="color:#fff4;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.5px">Route Builder</div>

  <div style="flex:1"></div>

  <!-- Depot badge -->
  <div style="background:rgba(255,255,255,.12);border-radius:8px;padding:5px 12px;color:#fff;font-size:12px;display:flex;align-items:center;gap:6px">
    <span style="font-size:16px">🏠</span>
    <div>
      <div style="font-weight:700;font-size:11px">Depot</div>
      <div style="opacity:.7;font-size:10px">Cornerstone Office/Yard</div>
    </div>
  </div>

  <!-- Date picker -->
  <div style="display:flex;align-items:center;gap:8px">
    <input id="date-input" type="date"
      style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.2);border-radius:8px;color:#fff;padding:5px 10px;font-size:13px;font-weight:600;outline:none"
      onchange="handleDateChange(this.value)"/>
    <div id="day-badge" style="background:rgba(255,255,255,.15);border-radius:6px;padding:4px 10px;color:#fff;font-size:12px;font-weight:700;min-width:80px;text-align:center">—</div>
  </div>

  <!-- Actions -->
  <div style="display:flex;gap:8px">
    <button onclick="loadTemplate()" style="background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">📋 Template</button>
    <button onclick="optimizeAll()" style="background:#2563eb;color:#fff;padding:6px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer">⚡ Optimize All</button>
    <button onclick="saveAll()" style="background:#16a34a;color:#fff;padding:7px 18px;border-radius:8px;font-size:13px;font-weight:800;cursor:pointer">💾 Save &amp; Dispatch</button>
    <a href="index.html" style="background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);color:#fff;padding:6px 12px;border-radius:8px;font-size:12px;font-weight:600;text-decoration:none">← App</a>
  </div>
</header>

<!-- ── QUICK DAY BUTTONS ───────────────────────────────────────────────── -->
<div style="background:#fff;border-bottom:1px solid #e5e7eb;padding:6px 16px;display:flex;align-items:center;gap:8px;flex-shrink:0">
  <span style="font-size:11px;font-weight:700;color:#9ca3af;text-transform:uppercase;letter-spacing:.5px;margin-right:4px">Quick load:</span>
  <button onclick="loadDay('Monday')"    class="day-btn">Mon</button>
  <button onclick="loadDay('Tuesday')"   class="day-btn">Tue</button>
  <button onclick="loadDay('Wednesday')" class="day-btn">Wed</button>
  <button onclick="loadDay('Thursday')"  class="day-btn">Thu</button>
  <style>.day-btn{padding:4px 14px;border-radius:20px;background:#f3f4f6;border:none;font-size:12px;font-weight:700;color:#374151;cursor:pointer;transition:all .15s}.day-btn:hover{background:#e5e7eb}</style>

  <div style="flex:1"></div>

  <button onclick="clearAll()" style="padding:4px 12px;border-radius:6px;background:#fee2e2;color:#dc2626;font-size:12px;font-weight:700;border:none;cursor:pointer">🗑 Clear All</button>

  <!-- Legend -->
  <div style="display:flex;gap:12px;padding-left:12px;border-left:1px solid #e5e7eb">
    <span style="font-size:11px;font-weight:700;color:#9ca3af">CREW:</span>
    <div id="legend" style="display:flex;gap:8px"></div>
  </div>
  <script>
    document.addEventListener('DOMContentLoaded',()=>{
      const CREW2=[
        {name:'Neri',color:'#16a34a'},{name:'Mateos',color:'#2563eb'},
        {name:'Erick',color:'#d97706'},{name:'Luis',color:'#7c3aed'},
        {name:'Mario',color:'#db2877'}]
      document.getElementById('legend').innerHTML=CREW2.map(c=>
        `<div style="display:flex;align-items:center;gap:4px">
          <div style="width:10px;height:10px;border-radius:50%;background:${c.color}"></div>
          <span style="font-size:11px;font-weight:600;color:#374151">${c.name}</span>
        </div>`).join('')
    })
  </script>
</div>

<!-- ── MAIN LAYOUT: Left sidebar + Map ───────────────────────────────────── -->
<div style="flex:1;display:flex;overflow:hidden;min-height:0">

  <!-- LEFT SIDEBAR -->
  <div style="width:340px;flex-shrink:0;background:#fff;border-right:1px solid #e5e7eb;display:flex;flex-direction:column;overflow:hidden">

    <!-- Tabs -->
    <div class="tab-bar">
      <button id="tab-routes" onclick="switchTab('routes')" class="flex-1 py-2 text-xs font-bold border-b-2 border-blue-600 text-blue-600 bg-white">Routes</button>
      <button id="tab-crew"   onclick="switchTab('crew')"   class="flex-1 py-2 text-xs font-semibold text-gray-400 hover:text-gray-600 bg-white">Crew Status</button>
    </div>

    <!-- Plan Summary strip -->
    <div style="background:#f8fafc;border-bottom:1px solid #e5e7eb;padding:10px 14px;display:flex;gap:16px;flex-shrink:0">
      <div style="text-align:center">
        <div id="summary-stops" style="font-size:20px;font-weight:800;color:#0d1f3a">0</div>
        <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase">Stops</div>
      </div>
      <div style="text-align:center">
        <div id="summary-crews" style="font-size:20px;font-weight:800;color:#0d1f3a">0/5</div>
        <div style="font-size:10px;color:#9ca3af;font-weight:600;text-transform:uppercase">Crews</div>
      </div>
      <div style="text-align:center;flex:1">
        <div id="summary-day" style="font-size:14px;font-weight:700;color:#374151">—</div>
        <div id="summary-date" style="font-size:10px;color:#9ca3af">—</div>
      </div>
      <div style="text-align:right;font-size:10px;color:#9ca3af;line-height:1.6">
        <div style="font-weight:600">Depot</div>
        <div id="summary-depot" style="color:#374151;font-weight:700;font-size:11px">—</div>
      </div>
    </div>

    <!-- Route list / Crew panel -->
    <div style="flex:1;overflow-y:auto;padding:10px">
      <div id="pane-routes">
        <div id="route-list"></div>
      </div>
      <div id="pane-crew" style="display:none">
        <div id="crew-panel"></div>
      </div>
    </div>
  </div>

  <!-- MAP PANEL -->
  <div style="flex:1;position:relative;overflow:hidden">
    <div id="dispatch-map" style="position:absolute;inset:0"></div>

    <!-- Map overlay: legend chip -->
    <div style="position:absolute;top:12px;left:12px;background:rgba(255,255,255,.95);border-radius:12px;padding:10px 14px;box-shadow:0 2px 12px rgba(0,0,0,.15);font-size:12px;z-index:5;pointer-events:none">
      <div style="font-weight:700;color:#374151;margin-bottom:6px;font-size:11px;text-transform:uppercase;letter-spacing:.5px">Route Legend</div>
      <div style="display:flex;flex-direction:column;gap:4px" id="map-legend"></div>
      <div style="margin-top:8px;padding-top:8px;border-top:1px solid #f3f4f6;display:flex;align-items:center;gap:5px">
        <div style="width:12px;height:12px;border-radius:50%;background:#0d1f3a"></div>
        <span style="color:#374151;font-weight:600;font-size:11px">Depot (Start/End)</span>
      </div>
    </div>

    <script>
      document.addEventListener('DOMContentLoaded',()=>{
        const CREW3=[
          {name:'Neri',lm:'LM1',color:'#16a34a'},{name:'Mateos',lm:'LM2',color:'#2563eb'},
          {name:'Erick',lm:'LM3',color:'#d97706'},{name:'Luis',lm:'LM4',color:'#7c3aed'},
          {name:'Mario',lm:'LM5',color:'#db2877'}]
        document.getElementById('map-legend').innerHTML=CREW3.map(c=>
          `<div style="display:flex;align-items:center;gap:6px">
            <div style="width:20px;height:4px;border-radius:2px;background:${c.color}"></div>
            <span style="font-weight:600;color:#374151">${c.name}</span>
            <span style="color:#9ca3af;font-size:10px">${c.lm}</span>
          </div>`).join('')
      })
    </script>

    <!-- Loading indicator -->
    <div id="map-loading" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;background:#f9fafb;z-index:4;pointer-events:none">
      <div style="text-align:center">
        <div style="width:40px;height:40px;border:3px solid #e5e7eb;border-top:3px solid #2563eb;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px"></div>
        <div style="color:#6b7280;font-size:14px;font-weight:600">Loading map…</div>
      </div>
    </div>
    <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
    <script>window.addEventListener('load',()=>setTimeout(()=>{const el=document.getElementById('map-loading');if(el)el.style.display='none'},8000))</script>
    <script>const origInit=window.initGMap;window.initGMap=function(){if(origInit)origInit();const el=document.getElementById('map-loading');if(el)el.style.display='none'}</script>
  </div>
</div>

</body>
</html>
